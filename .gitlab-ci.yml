stages:
  - release
  - cleanup

# Workflow:
#   1. Locally run: bash release.sh 1.2.0
#   2. Script bumps manifest.json, commits, tags v1.2.0, pushes to GitLab
#   3. This pipeline triggers automatically on tag push
#   4. Pipeline mirrors to GitHub + creates GitHub release
#
# Required CI variable (Settings → CI/CD → Variables):
#   GITHUB_TOKEN — GitHub PAT with "repo" scope (classic token: ghp_...)

release:
  stage: release
  image: alpine:latest
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
  before_script:
    - apk add --no-cache git curl jq
    - git config --global user.email "ci@aionflux.net"
    - git config --global user.name "AionFlux CI"
    - git config --global --add safe.directory "$CI_PROJECT_DIR"
  script:
    - |
      VERSION="${CI_COMMIT_TAG#v}"
      echo "Publishing release v$VERSION to GitHub"

    - |
      # Verify token identity
      GH_USER=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" https://api.github.com/user | jq -r '.login')
      echo "GitHub token belongs to: $GH_USER"
      # Check repo access
      REPO_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
        -H "Authorization: Bearer $GITHUB_TOKEN" \
        https://api.github.com/repos/aionfluxnet/homeassistant)
      echo "Repo API status: $REPO_STATUS"

    - |
      # Push full repo to GitHub (mirror)
      GITHUB_REMOTE="https://${GITHUB_TOKEN}@github.com/aionfluxnet/homeassistant.git"
      git remote add github "$GITHUB_REMOTE" 2>/dev/null || \
        git remote set-url github "$GITHUB_REMOTE"
      git push github HEAD:refs/heads/main --force
      git push github "$CI_COMMIT_TAG:refs/tags/$CI_COMMIT_TAG" --force
      echo "Pushed to GitHub"

    - |
      # Create GitHub release
      VERSION="${CI_COMMIT_TAG#v}"
      HTTP_CODE=$(curl -s -o /tmp/gh_release.json -w "%{http_code}" \
        -X POST \
        -H "Authorization: Bearer $GITHUB_TOKEN" \
        -H "Accept: application/vnd.github.v3+json" \
        "https://api.github.com/repos/aionfluxnet/homeassistant/releases" \
        -d "{
          \"tag_name\": \"${CI_COMMIT_TAG}\",
          \"name\": \"${CI_COMMIT_TAG}\",
          \"body\": \"## AionFlux Home Assistant Integration ${CI_COMMIT_TAG}\n\n### Installation via HACS\n1. Add custom repository: \`https://github.com/aionfluxnet/homeassistant\`\n2. Search for \\\"AionFlux\\\" and install\n3. Restart Home Assistant\n4. Add integration in Settings → Devices & Services\n\n### What's included\n- Telemetry sensors (temperature, humidity, range, battery, RSSI, SNR)\n- Online/offline binary sensor\n- Active alerts sensor\",
          \"draft\": false,
          \"prerelease\": false
        }")
      cat /tmp/gh_release.json | jq '{url: .html_url, id: .id}' 2>/dev/null || cat /tmp/gh_release.json
      if [ "$HTTP_CODE" = "201" ]; then
        echo "GitHub release ${CI_COMMIT_TAG} created"
        cat /tmp/gh_release.json | jq -r '.html_url'
      elif [ "$HTTP_CODE" = "422" ]; then
        echo "Release ${CI_COMMIT_TAG} already exists on GitHub — OK"
      else
        echo "GitHub release failed (HTTP $HTTP_CODE)"
        exit 1
      fi

cleanup-old-releases:
  stage: cleanup
  image: alpine:latest
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual
  before_script:
    - apk add --no-cache curl jq
  script:
    - |
      KEEP="${KEEP_TAG:-v1.1.0}"
      echo "Deleting all GitHub releases except: $KEEP"
      RELEASES=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
        "https://api.github.com/repos/aionfluxnet/homeassistant/releases?per_page=100")
      echo "$RELEASES" | jq -r '.[] | "\(.id) \(.tag_name)"' | while read ID TAG; do
        if [ "$TAG" != "$KEEP" ]; then
          echo "Deleting release $TAG (id=$ID)..."
          curl -s -X DELETE \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/aionfluxnet/homeassistant/releases/$ID"
          echo "Deleting tag $TAG from GitHub..."
          curl -s -X DELETE \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/aionfluxnet/homeassistant/git/refs/tags/$TAG"
          echo "Done: $TAG"
        else
          echo "Keeping: $TAG"
        fi
      done
