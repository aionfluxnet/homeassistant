stages:
  - release

# Trigger: push a tag like v1.2.0  →  pipeline runs automatically
#          OR: CI → Pipelines → Run pipeline with VERSION variable (manual)
# Required CI variable (Settings → CI/CD → Variables): GITHUB_TOKEN (GitHub PAT, repo scope)

release:
  stage: release
  image: alpine:latest
  rules:
    # Auto-trigger on version tags (v1.0.0, v1.2.3, ...)
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
      variables:
        VERSION: "$CI_COMMIT_TAG"
    # Manual trigger with VERSION variable set
    - if: '$VERSION != ""'
      when: manual
  variables:
    VERSION: ""
  before_script:
    - apk add --no-cache git curl jq
    - git config --global user.email "ci@aionflux.net"
    - git config --global user.name "AionFlux CI"
    - git config --global --add safe.directory "$CI_PROJECT_DIR"
  script:
    - |
      if [ -z "$VERSION" ]; then
        echo "ERROR: VERSION variable is required (e.g. 1.2.0)"
        exit 1
      fi
      # Strip leading 'v' if present (e.g. v1.0.0 -> 1.0.0)
      VERSION="${VERSION#v}"
      echo "Releasing version $VERSION"

    - |
      # Bump version in manifest.json
      jq --arg v "$VERSION" '.version = $v' \
        custom_components/aionflux/manifest.json > /tmp/manifest.json
      mv /tmp/manifest.json custom_components/aionflux/manifest.json
      echo "manifest.json updated to $VERSION"

    - |
      # Commit version bump if anything changed
      git add custom_components/aionflux/manifest.json
      git diff --cached --quiet || git commit -m "chore: release v$VERSION [skip ci]"

    - |
      # Create and push tag to GitLab
      git tag "v$VERSION" || echo "Tag v$VERSION already exists, continuing"
      git push "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}:${CI_SERVER_PORT}/${CI_PROJECT_PATH}.git" \
        HEAD:main "v$VERSION" 2>&1 || true

    - |
      # Push to GitHub
      GITHUB_REMOTE="https://oauth2:${GITHUB_TOKEN}@github.com/aionfluxnet/homeassistant.git"
      git remote add github "$GITHUB_REMOTE" 2>/dev/null || \
        git remote set-url github "$GITHUB_REMOTE"
      git push github HEAD:main --force
      git push github "v$VERSION" --force
      echo "Pushed to GitHub"

    - |
      # Create GitHub release
      RELEASE_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
        -H "Authorization: Bearer $GITHUB_TOKEN" \
        -H "Accept: application/vnd.github.v3+json" \
        "https://api.github.com/repos/aionfluxnet/homeassistant/releases" \
        -d "{
          \"tag_name\": \"v${VERSION}\",
          \"name\": \"v${VERSION}\",
          \"body\": \"## AionFlux Home Assistant Integration v${VERSION}\n\n### Installation\n1. Add repository to HACS: \`https://github.com/aionfluxnet/homeassistant\`\n2. Search for \\\"AionFlux\\\" in HACS integrations\n3. Restart Home Assistant\n4. Add integration in Settings → Devices & Services\",
          \"draft\": false,
          \"prerelease\": false
        }")
      HTTP_CODE=$(echo "$RELEASE_RESPONSE" | tail -1)
      BODY=$(echo "$RELEASE_RESPONSE" | head -1)
      if [ "$HTTP_CODE" = "201" ]; then
        echo "GitHub release v$VERSION created successfully"
        echo "$BODY" | jq '.html_url'
      elif [ "$HTTP_CODE" = "422" ]; then
        echo "Release v$VERSION already exists on GitHub — skipping"
      else
        echo "GitHub release creation failed (HTTP $HTTP_CODE):"
        echo "$BODY"
        exit 1
      fi
